<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator - Bina Karya Motor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #121416;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- NAVBAR STYLES --- */
        header {
            background-color: #1a1d20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #2d3238;
            position: relative;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        /* Ganti link di src untuk merubah gambar logo */
        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .logo-text span {
            color: #FBC02D; /* Warna kuning "MOTOR" */
        }

        .menu-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        /* --- SIDE MENU (GAMBAR 2) --- */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 350px;
            height: 100%;
            background-color: #1a1d20;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: 0.4s ease;
            z-index: 999;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .sidebar.active {
            right: 0;
        }

        .close-btn {
            align-self: flex-end;
            background: none;
            border: none;
            color: #888;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-btn:hover {
            color: white;
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 20px;
        }

        .sidebar-item a {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .sidebar-item a i {
            font-size: 1.3rem;
            width: 25px;
            text-align: center;
        }

        /* Overlay background saat menu buka */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 998;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* --- MAIN CONTENT & CALCULATOR --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background-color: #1a1d20;
            width: 100%;
            max-width: 360px;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid #2d3238;
        }

        .display {
            width: 100%;
            height: 80px;
            background-color: #121416;
            border: none;
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 15px;
            color: white;
            text-align: right;
            font-size: 2rem;
            font-weight: 600;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            background-color: #2d3238;
            border: none;
            border-radius: 50%; /* Membuat tombol bulat sempurna */
            aspect-ratio: 1/1;  /* Menjaga tombol tetap bulat */
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Warna khusus tombol operator & aksi */
        .btn.operator {
            background-color: #374151;
            color: #FBC02D;
        }

        .btn.clear {
            background-color: #ef4444;
            color: white;
        }

        /* Tombol Hitung Sesuai Tema Foto 1 (Hijau Cerah) */
        .btn.equal {
            background-color: #FFCC00;
            color: #000000;
            font-weight: 700;
            grid-column: span 2;
            border-radius: 30px;
            aspect-ratio: auto;
            height: 100%;
        }

        .btn.equal:hover {
            background-color: #00c853;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo-container">
            <img src="https://i.ibb.co.com/gcPFkkh/Proyek-Baru-6-32-D0-F1-A.png" alt="Logo" class="logo-img">
            <div class="logo-text">BINA KARYA<span>MOTOR</span></div>
        </a>
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>
    </header>

    <div class="overlay" id="overlay"></div>

    <nav class="sidebar" id="sidebar">
        <button class="close-btn" id="closeMenu">
            <i class="fas fa-times"></i>
        </button>
        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a href="index.html"><i class="fas fa-motorcycle"></i> Motor Second</a>
            </li>
            <li class="sidebar-item">
                <a href="https://wa.me/6285810144127?text=Permisi%20Pak,%20saya%20ingin%20bertanya%20mengenai%20motor%20baru" target="_blank"><i class="fab fa-whatsapp"></i> Beli Motor Baru to Admin</a>
            </li>
            <li class="sidebar-item">
                <a href="kalkulator.html" target="_blank"><i class="fa-solid fa-calculator"></i> Kalkulator</a>
            </li>
            <li class="sidebar-item">
                <a href="tentang.html"><i class="fas fa-info-circle"></i> Tentang Kami</a>
            </li>
            <li class="sidebar-item">
                <a href="https://maps.app.goo.gl/pRiM3vefCmUfwEo19" target="_blank"><i class="fas fa-map-marker-alt"></i> Lokasi Showroom</a>
            </li>
        </ul>
    </nav>

    <main>
        <div class="calculator">
            <input type="text" class="display" id="display" readonly value="0">
            
            <div class="buttons">
                <button class="btn clear" onclick="clearDisplay()">C</button>
                <button class="btn operator" onclick="appendOperator('%')">%</button>
                <button class="btn operator" onclick="appendOperator('/')">÷</button>
                <button class="btn operator" onclick="deleteLast()"><i class="fas fa-backspace"></i></button>

                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn operator" onclick="appendOperator('*')">×</button>

                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn operator" onclick="appendOperator('-')">-</button>

                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn operator" onclick="appendOperator('+')">+</button>

                <button class="btn" onclick="appendNumber('0')">0</button>
                <button class="btn" onclick="appendNumber('.')">.</button>
                <button class="btn equal" onclick="calculate()">=</button>
            </div>
        </div>
    </main>

    <script>
        // --- LOGIKA HAMBURGER MENU ---
        const menuToggle = document.getElementById('menuToggle');
        const closeMenu = document.getElementById('closeMenu');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function bukaMenu() {
            sidebar.classList.add('active');
            overlay.classList.add('active');
        }

        function tutupMenu() {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        menuToggle.addEventListener('click', bukaMenu);
        closeMenu.addEventListener('click', tutupMenu);
        overlay.addEventListener('click', tutupMenu);


        // --- LOGIKA KALKULATOR ---
        const display = document.getElementById('display');
        let currentInput = '0';
        let isCalculated = false;

        function updateDisplay() {
            // Mengubah tampilan operator agar lebih ramah pengguna saat diketik
            let formattedDisplay = currentInput
                .replace(/\*/g, ' × ')
                .replace(/\//g, ' ÷ ')
                .replace(/\+/g, ' + ')
                .replace(/\-/g, ' - ')
                .replace(/%/g, ' % ');
            display.value = formattedDisplay;
        }

        function appendNumber(number) {
            if (currentInput === '0' || isCalculated) {
                currentInput = number;
                isCalculated = false;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendOperator(operator) {
            if (isCalculated) isCalculated = false;
            
            const lastChar = currentInput.trim().slice(-1);
            // Mencegah double operator berturut-turut
            if (['+', '-', '*', '/', '%'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function calculate() {
            try {
                let expression = currentInput;
                
                // Logika pemrosesan persen (%) agar berfungsi seperti kalkulator umum 
                // Contoh: 50 + 10% menjadi 50 + (50 * 0.1) atau pemrosesan angka tunggal (10% -> 0.1)
                if (expression.includes('%')) {
                    // Penanganan dasar persen sederhana (contoh: 200 * 10% -> 200 * 0.1)
                    expression = expression.replace(/(\d+(\.\d+)?)\s*%/g, "($1/100)");
                }

                let result = eval(expression);
                
                // Menghindari angka desimal super panjang floating point (ex: 0.1 + 0.2)
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(8));
                }

                currentInput = result.toString();
                isCalculated = true;
                updateDisplay();
            } catch (error) {
                display.value = "Error";
                currentInput = '0';
                isCalculated = true;
            }
        }
    </script>
</body>
</html>
